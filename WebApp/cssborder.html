<!--css border-->
<html>
    <head>
        <title>
            CSS Border
        </title>
        <style>
            h1{
                border-style: dotted;
            }
            h2
            {
                border-style: dashed;
                border-color: aqua;
                border-width: 5px;
                
            }
            p
            {
                border-top-style: dashed;
                border-top-color: red;
                border-top-width: 10px;
                border-bottom-style: dotted;
                border-bottom-color: blue;
                border-bottom-width: 10px;
            }
        </style>
    </head>
    <body>
        <h1>This is Border</h1>
        <h2>Border Style</h2>
        <p>Border Style is used to set the style of the border. It has 14 different values.</p>
    </body>
</html>
