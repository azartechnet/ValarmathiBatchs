<!-- Text alignment
===============
 text-align: center;
 text-align-last: justify;
 direction: ltr;        
 unicode-bidi: bidi-override; -->

 <html>
    <head>
        <title></title>
    </head>
    <body>
        <p style="text-align: center;">This text is centered.</p>
        <p style="text-align-last: right;">This text is justified on the last line.</p>
        <p style="direction: rtl; unicode-bidi: bidi-override;">This text is displayed from right to left.</p>
        <p style="direction: ltr; unicode-bidi: bidi-override;">This text is displayed from left to right.</p>

    </body>
 </html>
