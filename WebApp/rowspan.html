<!--rowspan-->
<!DOCTYPE html>
<html>
    <head>
        <title>Rowspan Example</title>
    </head>
    <body>
        <table border="1" cellpadding="10" cellspacing="0">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
            <tr>
                <td rowspan="2">John Doe</td>
                <td>30</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>31</td>
                <td>Los Angeles</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>25</td>
                <td>Chicago</td>
            </tr>
        </table>
    </body>
