<style>
.circle {
  width: 100px;
  height: 100px;
  background-color: #1abc9c;
  border-radius: 50%;
  animation: move 2s linear infinite;
}
@keyframes move {
  0% {
    transform: translateX(0);
  }
  50% {
    transform: translateX(200px);
  }
  100% {
    transform: translateX(0);
  }
}
</style>
<div class="circle"></div>
<!--
 Zoom in Effect
-->
<style>
.zoom {
  width: 100px;
  height: 100px;
  background-color: #e74c3c;
  border-radius: 50%;
  animation: zoomIn 2s linear infinite;
}
@keyframes zoomIn {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.5);
  }
  100% {
    transform: scale(1);
  }
}
</style>
<div class="zoom"></div>
<!--
    Rotate Effect
-->
<style>
.rotate {
  width: 100px;
  height: 100px;
  background-color: #3498db;
  border-radius: 50%;
  animation: rotate 2s linear infinite;
}
@keyframes rotate {
  0% {
    transform: rotate(0deg);
  }
  50% {
    transform: rotate(180deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
</style>
<div class="rotate"></div>
<!--
 Sliding text
-->
<style>
.sliding-text {
  font-size: 24px;
  color: #9b59b6;
  animation: slideText 3s linear infinite;
}
@keyframes slideText {
  0% {
    transform: translateX(0);
  }
  50% {
    transform: translateX(200px);
  }
  100% {
    transform: translateX(0);
  }
}
</style>
<div class="sliding-text">Sliding Text</div>
<!--Loading spinner-->
<style>
.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #f3f3f3;
  border-top: 5px solid #3498db;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
</style>
<div class="spinner"></div>
