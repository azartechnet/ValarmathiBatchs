<html>
    <head>
        <title>CSS ID Class Selectors</title>
        <style>
            .class1 {
                color: red;
            }
            .class2 {
                color: blue;
            }
            #id1 {
                font-weight: bold;
                background-color: yellow;
            }
            #id2 {
                font-style: italic;
            }
        </style>
    </head>
    <body>
        <p class="class1">This text is red and bold.</p>
        <p class="class2">This text is blue and italic.</p>
        <p id="id1">This text is red, blue, and bold.</p>
        <p id="id2">This text is red, blue, and italic.</p>
</html>
