<html>
    <head>
        <title>InternalStyleSheet</title>
        <style>
            p
            {
                background-color: rgb(231, 215, 250);
                font-family: 'Courier New', Courier, monospace;
            }
            h1
            {
                color: rgb(202, 97, 97);
                font-family: 'Times New Roman', Times, serif;
            }
        </style>
    </head>
    <body>
        <h1>Internal Stylesheet</h1>
        <p>
            This is a paragraph with an internal stylesheet.
        </p>
        <p>
            This is another paragraph with an internal stylesheet.
        </p>
    </body>
</html>
