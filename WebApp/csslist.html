<html>
    <head>
        <title></title>
        <style>
           
            ul{
                margin: 20px;
                padding: 10px;
                border: 1px solid black;
                list-style-type: square;
            }
            ol{
                margin: 20px;
                padding: 10px;
                border: 1px solid black;
                list-style-type: decimal;
            }
        </style>
    </head>
    <body>
        <h1>CSS List</h1>
        
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>Third item</li>
        </ol>
    </body>
</html>
